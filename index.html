<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas - ExchangeRate API</title>
    <!-- Tailwind CSS para estilização rápida e moderna -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons para os ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Animação suave para o botão de inverter moedas */
        .spin-anim { transition: transform 0.3s ease; }
        .spin-anim:active { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <main class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden border border-slate-100">
        <!-- Cabeçalho -->
        <header class="bg-indigo-600 p-6 text-white text-center">
            <div class="flex justify-center mb-3">
                <i data-lucide="circle-dollar-sign" class="w-10 h-10"></i>
            </div>
            <h1 class="text-2xl font-bold">Conversor de Moedas</h1>
            <p class="text-indigo-200 text-sm mt-1">Servidor Local - ExchangeRate API</p>
        </header>

        <div class="p-6 space-y-5">
            <!-- Entrada de Valor -->
            <div>
                <label for="amount" class="block text-sm font-medium text-slate-700 mb-1">Valor a converter</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 transform -translate-y-1/2 text-slate-500 font-medium">$</span>
                    <input type="number" id="amount" value="1" min="0" step="0.01"
                        class="w-full pl-8 pr-4 py-3 text-lg border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>

            <!-- Seleção de Moedas -->
            <div class="flex items-center gap-3 relative">
                <div class="flex-1">
                    <label for="baseCurrency" class="block text-xs font-medium text-slate-500 mb-1">De (Base)</label>
                    <select id="baseCurrency" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 bg-white font-medium appearance-none cursor-pointer outline-none">
                        <option value="USD">🇺🇸 USD - Dólar</option>
                        <option value="BRL" selected>🇧🇷 BRL - Real</option>
                        <option value="EUR">🇪🇺 EUR - Euro</option>
                        <option value="GBP">🇬🇧 GBP - Libra</option>
                        <option value="JPY">🇯🇵 JPY - Iene</option>
                        <option value="CAD">🇨🇦 CAD - Dólar Can.</option>
                    </select>
                </div>

                <!-- Botão Inverter -->
                <button id="swapBtn" class="spin-anim mt-5 bg-slate-100 hover:bg-slate-200 p-3 rounded-full border border-slate-200 text-slate-600 focus:outline-none" title="Inverter moedas">
                    <i data-lucide="arrow-right-left" class="w-5 h-5"></i>
                </button>

                <div class="flex-1">
                    <label for="targetCurrency" class="block text-xs font-medium text-slate-500 mb-1">Para (Alvo)</label>
                    <select id="targetCurrency" class="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 bg-white font-medium appearance-none cursor-pointer outline-none">
                        <option value="USD" selected>🇺🇸 USD - Dólar</option>
                        <option value="BRL">🇧🇷 BRL - Real</option>
                        <option value="EUR">🇪🇺 EUR - Euro</option>
                        <option value="GBP">🇬🇧 GBP - Libra</option>
                        <option value="JPY">🇯🇵 JPY - Iene</option>
                        <option value="CAD">🇨🇦 CAD - Dólar Can.</option>
                    </select>
                </div>
            </div>

            <!-- Botão Converter -->
            <button id="convertBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 rounded-xl shadow-md hover:shadow-lg transition-all flex justify-center items-center gap-2">
                <i data-lucide="refresh-cw" id="convertIcon" class="w-5 h-5"></i>
                Converter Agora
            </button>

            <!-- Área de Resultado -->
            <div id="resultArea" class="hidden mt-4 bg-indigo-50 p-5 rounded-xl border border-indigo-100 text-center">
                <p id="resultAmount" class="text-3xl font-bold text-indigo-700"></p>
                <p id="resultRate" class="text-sm text-indigo-500 mt-2 font-medium"></p>
            </div>

            <!-- Área de Erro -->
            <div id="errorArea" class="hidden mt-4 bg-red-50 p-4 rounded-xl border border-red-200 text-red-600 text-sm text-center flex items-center justify-center gap-2">
                <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
                <span id="errorMessage"></span>
            </div>
        </div>
    </main>

    <script>
        // Inicializa os ícones do Lucide
        lucide.createIcons();

        // Elementos do DOM
        const amountInput = document.getElementById('amount');
        const baseCurrency = document.getElementById('baseCurrency');
        const targetCurrency = document.getElementById('targetCurrency');
        const convertBtn = document.getElementById('convertBtn');
        const swapBtn = document.getElementById('swapBtn');
        const convertIcon = document.getElementById('convertIcon');
        const resultArea = document.getElementById('resultArea');
        const resultAmount = document.getElementById('resultAmount');
        const resultRate = document.getElementById('resultRate');
        const errorArea = document.getElementById('errorArea');
        const errorMessage = document.getElementById('errorMessage');

        // Função para formatar moeda
        const formatCurrency = (value, currency) => {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: currency }).format(value);
        };

        // Função para exibir erros
        const showError = (msg) => {
            resultArea.classList.add('hidden');
            errorArea.classList.remove('hidden');
            errorMessage.textContent = msg;
            convertIcon.classList.remove('animate-spin');
        };

        // Função principal de conversão
        const converter = async () => {
            const amount = parseFloat(amountInput.value);
            const base = baseCurrency.value;
            const target = targetCurrency.value;

            // Validações básicas
            if (isNaN(amount) || amount < 0) {
                showError('Por favor, insira um valor numérico válido maior que zero.');
                return;
            }
            if (base === target) {
                showError('A moeda base e alvo são as mesmas.');
                return;
            }

            // Preparando UI para carregamento
            errorArea.classList.add('hidden');
            resultArea.classList.add('hidden');
            convertIcon.classList.add('animate-spin');

            try {
                // Chamar servidor local
                const response = await fetch('/convert', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        amount: amount,
                        fromCurrency: base,
                        toCurrency: target
                    })
                });
                
                const data = await response.json();

                if (data.result === 'success') {
                    const rate = data.conversion_rate;
                    const total = data.conversion_result;

                    // Atualiza a UI com os resultados
                    resultAmount.textContent = formatCurrency(total, target);
                    resultRate.textContent = `1 ${base} = ${rate.toFixed(4)} ${target}`;
                    
                    resultArea.classList.remove('hidden');
                } else {
                    showError(data.error || 'Erro desconhecido no servidor.');
                }
            } catch (error) {
                showError('Falha na conexão com o servidor local. Certifique-se de que o servidor Java está rodando.');
                console.error(error);
            } finally {
                convertIcon.classList.remove('animate-spin');
            }
        };

        // Event Listeners
        convertBtn.addEventListener('click', converter);

        // Permite converter apertando Enter no campo de valor
        amountInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') converter();
        });

        // Lógica para inverter as moedas
        swapBtn.addEventListener('click', () => {
            const temp = baseCurrency.value;
            baseCurrency.value = targetCurrency.value;
            targetCurrency.value = temp;
            
            // Se já tiver um resultado na tela, converte automaticamente após inverter
            if (!resultArea.classList.contains('hidden')) {
                converter();
            }
        });

    </script>
</body>
</html>
